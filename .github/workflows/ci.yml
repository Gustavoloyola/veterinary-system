name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  java-services:
    name: Build Java services
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - owner-service
          - pet-service

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Compilar y ejecutar pruebas
        working-directory: ${{ matrix.service }}
        run: ./mvnw clean verify

  frontend:
    name: Build Angular frontend
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: veterinary-frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: veterinary-frontend
        run: npm ci

      - name: Compilar frontend
        working-directory: veterinary-frontend
        run: npm run build

  docker-build:
    name: Validate Docker build
    runs-on: ubuntu-latest
    needs:
      - java-services
      - frontend

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Construir imágenes
        run: docker compose build