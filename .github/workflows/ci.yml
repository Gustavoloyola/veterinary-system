name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  java-services:
    name: Build Java services (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - owner-service
          - pet-service

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: veterinary_ci
          MYSQL_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Descargar código
        uses: actions/checkout@v5

      - name: Configurar Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Dar permisos a Maven Wrapper
        working-directory: ${{ matrix.service }}
        run: chmod +x mvnw

      - name: Compilar y ejecutar pruebas
        working-directory: ${{ matrix.service }}
        env:
          SPRING_DATASOURCE_URL: "jdbc:mysql://127.0.0.1:3306/veterinary_ci?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          JWT_SECRET: "01234567890123456789012345678901"
          AUTH_USERNAME: admin
          AUTH_PASSWORD: admin123
          OWNER_SERVICE_URL: "http://localhost:8082"
        run: ./mvnw clean verify

  frontend:
    name: Build Angular frontend
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: veterinary-frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: veterinary-frontend
        run: npm ci

      - name: Compilar frontend
        working-directory: veterinary-frontend
        run: npm run build

  docker-build:
    name: Validate Docker build
    runs-on: ubuntu-latest
    needs:
      - java-services
      - frontend

    steps:
      - name: Descargar código
        uses: actions/checkout@v5

      - name: Construir imágenes
        run: docker compose build