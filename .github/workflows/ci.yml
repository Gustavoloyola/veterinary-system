name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  java-services:
    name: Build Java services (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - owner-service
          - pet-service

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: veterinary_ci
          MYSQL_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5

      - name: Configurar Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Dar permisos a Maven Wrapper
        working-directory: ${{ matrix.service }}
        run: chmod +x mvnw

      - name: Compilar y ejecutar pruebas
        working-directory: ${{ matrix.service }}
        env:
          SPRING_DATASOURCE_URL: "jdbc:mysql://127.0.0.1:3306/veterinary_ci?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          JWT_SECRET: "01234567890123456789012345678901"
          AUTH_USERNAME: admin
          AUTH_PASSWORD: admin123
          OWNER_SERVICE_URL: "http://localhost:8082"
        run: ./mvnw clean verify

  frontend:
    name: Build Angular frontend
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: veterinary-frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: veterinary-frontend
        run: npm ci

      - name: Compilar frontend
        working-directory: veterinary-frontend
        run: npm run build

  docker-build:
    name: Validate Docker build
    runs-on: ubuntu-latest
    needs:
      - java-services
      - frontend

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5

      - name: Construir imagenes
        run: docker compose build

  publish-ecr:
    name: Publish images to Amazon ECR
    runs-on: ubuntu-latest
    needs:
      - java-services
      - frontend
      - docker-build

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v5

      - name: Configurar credenciales temporales de AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Iniciar sesion en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir y publicar auth-service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/veterinary-auth-service:$IMAGE_TAG \
            -t $ECR_REGISTRY/veterinary-auth-service:latest \
            ./auth-service

          docker push $ECR_REGISTRY/veterinary-auth-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/veterinary-auth-service:latest

      - name: Construir y publicar owner-service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f ./owner-service/dockerfile \
            -t $ECR_REGISTRY/veterinary-owner-service:$IMAGE_TAG \
            -t $ECR_REGISTRY/veterinary-owner-service:latest \
            ./owner-service

          docker push $ECR_REGISTRY/veterinary-owner-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/veterinary-owner-service:latest

      - name: Construir y publicar pet-service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f ./pet-service/dockerfile \
            -t $ECR_REGISTRY/veterinary-pet-service:$IMAGE_TAG \
            -t $ECR_REGISTRY/veterinary-pet-service:latest \
            ./pet-service

          docker push $ECR_REGISTRY/veterinary-pet-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/veterinary-pet-service:latest

      - name: Construir y publicar frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f ./veterinary-frontend/dockerfile \
            -t $ECR_REGISTRY/veterinary-frontend:$IMAGE_TAG \
            -t $ECR_REGISTRY/veterinary-frontend:latest \
            ./veterinary-frontend

          docker push $ECR_REGISTRY/veterinary-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/veterinary-frontend:latest