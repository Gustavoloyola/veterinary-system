spring.application.name=auth-service
server.port=8081

app.auth.username=${AUTH_USERNAME:admin}
app.auth.password=${AUTH_PASSWORD:admin123}
app.auth.jwt-secret=${JWT_SECRET:01234567890123456789012345678901}
app.auth.jwt-expiration-ms=${JWT_EXPIRATION_MS:3600000}

management.endpoints.web.exposure.include=health,info